services:
  - type: web
    name: aegiscore-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: APP_NAME
        value: AegisCore
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: ""
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ALLOW_SELF_REGISTRATION
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_DB
        fromDatabase:
          name: aegiscore-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: aegiscore-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: aegiscore-postgres
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: aegiscore-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: aegiscore-postgres
          property: port
      - key: REDIS_URL
        fromDatabase:
          name: aegiscore-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: aegiscore-postgres
    plan: free
    databaseName: aegiscore
    user: aegiscore
    postgresMajorVersion: "16"
    ipAllowList: []

  - name: aegiscore-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
