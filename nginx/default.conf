server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /auth/ {
        proxy_pass http://backend:8000/auth/;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    location /ml/ {
        proxy_pass http://backend:8000/ml/;
    }

    location = /dashboard {
        proxy_pass http://frontend:5173/dashboard;
    }

    location ^~ /dashboard/ {
        proxy_pass http://backend:8000/dashboard/;
    }

    location = /alerts {
        proxy_pass http://frontend:5173/alerts;
    }

    location ^~ /alerts/ {
        proxy_pass http://backend:8000/alerts/;
    }

    location = /incidents {
        proxy_pass http://frontend:5173/incidents;
    }

    location ^~ /incidents/ {
        proxy_pass http://backend:8000/incidents/;
    }

    location = /logs {
        proxy_pass http://frontend:5173/logs;
    }

    location ^~ /logs/ {
        proxy_pass http://backend:8000/logs/;
    }

    location = /integrations {
        proxy_pass http://frontend:5173/integrations;
    }

    location ^~ /integrations/ {
        proxy_pass http://backend:8000/integrations/;
    }

    location = /analytics {
        proxy_pass http://frontend:5173/analytics;
    }

    location = /settings {
        proxy_pass http://frontend:5173/settings;
    }

    location = /login {
        proxy_pass http://frontend:5173/login;
    }

    location / {
        proxy_pass http://frontend:5173;
    }
}
