services:
  postgres:
    image: postgres:16-alpine
    container_name: aegiscore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegiscore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegiscore} -d ${POSTGRES_DB:-aegiscore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegiscore-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aegiscore-api
    env_file:
      - .env
      - apps/api/.env.example
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:${WEB_PORT:-3000},http://localhost:${NGINX_PORT:-8080}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./docs:/workspace/docs:ro
      - ./data:/workspace/data

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: aegiscore-worker
    env_file:
      - .env
      - apps/api/.env.example
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./apps/worker:/workspace/apps/worker

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aegiscore-web
    env_file:
      - .env
      - apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${NGINX_PORT:-8080}/api/v1
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:${NGINX_PORT:-8080}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - ./tsconfig.base.json:/workspace/tsconfig.base.json

  nginx:
    image: nginx:1.27-alpine
    container_name: aegiscore-nginx
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
