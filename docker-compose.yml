services:
  postgres:
    image: postgres:16-alpine
    container_name: aegiscore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegiscore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegiscore} -d ${POSTGRES_DB:-aegiscore}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aegiscore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aegiscore-backend
    environment:
      APP_NAME: AegisCore
      APP_ENV: development
      API_PREFIX: ""
      SECRET_KEY: ${SECRET_KEY:-change-me-for-local-dev}
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegiscore}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aegiscore-frontend
    environment:
      VITE_APP_NAME: AegisCore
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws/alerts}
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  nginx:
    image: nginx:1.27-alpine
    container_name: aegiscore-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
