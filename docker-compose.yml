services:
  postgres:
    image: postgres:16-alpine
    container_name: aegiscore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegiscore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegiscore} -d ${POSTGRES_DB:-aegiscore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegiscore-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegiscore-backend
    env_file:
      - .env
      - backend/.env.example
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},http://localhost:${NGINX_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./docs:/workspace/docs:ro
      - ./data:/workspace/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegiscore-worker
    command: ["python", "-m", "app.workers.tasks"]
    env_file:
      - .env
      - backend/.env.example
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore}@postgres:5432/${POSTGRES_DB:-aegiscore}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./docs:/workspace/docs:ro
      - ./data:/workspace/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegiscore-frontend
    env_file:
      - .env
      - frontend/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_WS_BASE_URL: ws://backend:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:1.27-alpine
    container_name: aegiscore-nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
